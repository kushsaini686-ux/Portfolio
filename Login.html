<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KWeb Portal | Secure Login</title>
    <link rel="stylesheet" href="./Login.css">
</head>
<body>

    <div class="login-wrapper">
        <div class="split-container">
            
            <div class="left-branding-panel">
                <div class="fluid-bg-shape"></div>
                <div class="panel-inner-content">
                    <div class="brand-badge">
                        <img src="./ks.jpg" alt="Kush Logo" class="badge-logo-img">
                    </div>
                    <h2 class="branding-title">Welcome Back!</h2>
                    <p class="branding-subtitle">To stay connected with us please login with your personal info</p>
                    
                    <a href="#signup" class="ghost-panel-btn">SIGN UP</a>
                    
                    <div class="panel-mini-footer">
                        <span>CREATOR HERE</span> | <span>DIRECTOR HERE</span>
                    </div>
                </div>
            </div>

            <div class="right-form-panel">
                <div class="form-inner-wrapper">
                    
                    <h1 class="welcome-heading">welcome</h1>
                    <p class="welcome-subtext">Login in to your account to continue</p>

                    <form action="http://127.0.0.1:3000" method="post" class="portal-form">
                        
                        <div class="field-container">
                            <input type="email" id="email" name="email" required placeholder="Email Address...">
                        </div>

                        <div class="field-container">
                            <input type="password" id="password" name="password" required placeholder="Password...">
                        </div>

                        <div class="forgot-wrapper">
                            <a href="#forgot" class="forgot-trigger-link">Forgot your password?</a>
                        </div>

                        <div class="action-wrapper">
                            <button type="submit" class="prime-login-btn">LOG IN</button>
                        </div>

                    </form>

                    <div class="portal-alt-nav">
                        <p>Don't have an account? <a href="#signup" class="highlight-signup-link">sign up</a></p>
                        <a href="./index.html" class="home-return-btn">← Return to Portfolio</a>
                    </div>

                </div>
            </div>

        </div>
    </div>

</body>
</html>
